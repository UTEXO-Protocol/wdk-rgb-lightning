name: Release

on:
  # Triggered by rgb-lightning-node after a new SDK release
  repository_dispatch:
    types: [rln-release]

  # Manual trigger
  workflow_dispatch:
    inputs:
      rln_version:
        description: 'RLN version to pin (e.g., 0.3.0-beta.2)'
        required: true
        type: string

  # Tag-based release (manual version bump + tag push)
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write # required for npm publish --provenance

jobs:
  publish:
    name: Publish npm package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve RLN version
        id: rln
        shell: bash
        run: |
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            VERSION="${{ github.event.client_payload.version }}"
            echo "version=${VERSION#v}" >> $GITHUB_OUTPUT
            echo "auto=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ inputs.rln_version }}"
            echo "version=${VERSION#v}" >> $GITHUB_OUTPUT
            echo "auto=true" >> $GITHUB_OUTPUT
          else
            echo "auto=false" >> $GITHUB_OUTPUT
          fi

      - name: Update RLN peer dependency versions
        if: steps.rln.outputs.auto == 'true'
        run: |
          RLN_VERSION="${{ steps.rln.outputs.version }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.peerDependencies['@utexo/rgb-lightning-node-bare'] = '^${RLN_VERSION}';
            pkg.peerDependencies['@utexo/rgb-lightning-node-nodejs'] = '^${RLN_VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Updated peer deps → ^${RLN_VERSION}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org/'

      - name: Bump package prerelease version
        if: steps.rln.outputs.auto == 'true'
        run: npm version prerelease --preid=beta --no-git-tag-version

      - name: Commit and push version bump
        if: steps.rln.outputs.auto == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump RLN peer deps to v${{ steps.rln.outputs.version }}"
          git push

      - name: Install dependencies
        run: npm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GH_TOKEN: ${{ github.token }}

      - name: Lint
        run: npm run lint

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Get package version
        id: pkg_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=v$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        if: steps.rln.outputs.auto == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.pkg_version.outputs.version }}
          name: Release ${{ steps.pkg_version.outputs.version }}
          body: |
            ## wdk-rgb-lightning ${{ steps.pkg_version.outputs.version }}

            WDK module for RGB Lightning — channels, invoices, payments, RGB-over-LN.

            Built with RGB Lightning Node v${{ steps.rln.outputs.version }}

            ### Installation
            ```bash
            npm install @utexo/wdk-rgb-lightning
            ```

            ### Peer dependencies
            ```json
            "@utexo/rgb-lightning-node-bare": "^${{ steps.rln.outputs.version }}",
            "@utexo/rgb-lightning-node-nodejs": "^${{ steps.rln.outputs.version }}"
            ```
          draft: false
          prerelease: ${{ contains(steps.pkg_version.outputs.version, 'beta') || contains(steps.pkg_version.outputs.version, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
